<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 825 545" width="825" height="545"
     font-family="Helvetica, Arial, sans-serif">

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#333333"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#AAAAAA"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="412" y="13" text-anchor="middle" font-size="11" font-weight="bold"
        fill="#666666" font-style="italic">LXB Cortex — Task Execution State Machine</text>

  <!-- START dot -->
  <circle cx="395" cy="24" r="8" fill="#333333"/>
  <line x1="395" y1="32" x2="395" y2="42" stroke="#333333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════
       INIT   y=42  h=58  bottom=100
       ═══════════════════════════════════════════════════════ -->
  <rect x="245" y="42" width="300" height="58" rx="5" fill="#E6F3FF" stroke="#333333" stroke-width="1.5"/>
  <text x="395" y="63"  text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">INIT</text>
  <text x="395" y="80"  text-anchor="middle" font-size="9.5" fill="#333333">Establish device connection · probe screen dimensions</text>
  <text x="395" y="94"  text-anchor="middle" font-size="9"   fill="#555555">Verify device readiness and calibrate coordinate space</text>

  <line x1="395" y1="100" x2="395" y2="112" stroke="#333333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════
       APP_RESOLVE   y=112  h=58  bottom=170
       ═══════════════════════════════════════════════════════ -->
  <rect x="245" y="112" width="300" height="58" rx="5" fill="#E6F3FF" stroke="#333333" stroke-width="1.5"/>
  <text x="395" y="133" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">APP_RESOLVE</text>
  <text x="395" y="150" text-anchor="middle" font-size="9.5" fill="#333333">Parse user intent · identify target application</text>
  <text x="395" y="164" text-anchor="middle" font-size="9"   fill="#555555">LLM selects the app from the installed package list</text>

  <line x1="395" y1="170" x2="395" y2="182" stroke="#333333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="358" y="178" font-size="8" fill="#444444" font-style="italic">app found</text>

  <!-- ═══════════════════════════════════════════════════════
       ROUTE_PLAN   y=182  h=58  bottom=240
       ═══════════════════════════════════════════════════════ -->
  <rect x="245" y="182" width="300" height="58" rx="5" fill="#E6F3FF" stroke="#333333" stroke-width="1.5"/>
  <text x="395" y="203" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">ROUTE_PLAN</text>
  <text x="395" y="220" text-anchor="middle" font-size="9.5" fill="#333333">Locate target page in the navigation map</text>
  <text x="395" y="234" text-anchor="middle" font-size="9"   fill="#555555">BFS computes the shortest tap sequence to the target</text>

  <line x1="395" y1="240" x2="395" y2="255" stroke="#333333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="356" y="251" font-size="8" fill="#444444" font-style="italic">path found</text>

  <!-- ROUTE_PLAN → VISION_ACT shortcut (already on target) — left rail, lighter -->
  <polyline points="245,211 118,211 118,392 245,392"
            fill="none" stroke="#AAAAAA" stroke-width="1.2" marker-end="url(#arr-g)"/>
  <text x="106" y="308" text-anchor="middle" font-size="7.5" fill="#AAAAAA" font-style="italic"
        transform="rotate(-90,106,308)">already on target page</text>

  <!-- APP_RESOLVE → VISION_ACT shortcut (no navigation map) — far-left rail, lighter -->
  <polyline points="245,141 68,141 68,370 245,370"
            fill="none" stroke="#AAAAAA" stroke-width="1.2" marker-end="url(#arr-g)"/>
  <text x="56" y="258" text-anchor="middle" font-size="7.5" fill="#AAAAAA" font-style="italic"
        transform="rotate(-90,56,258)">no map available</text>

  <!-- ═══════════════════════════════════════════════════════
       ROUTING   y=255  h=88  bottom=343
       ═══════════════════════════════════════════════════════ -->
  <rect x="245" y="255" width="300" height="88" rx="5" fill="#E6F3FF" stroke="#333333" stroke-width="1.5"/>
  <text x="395" y="276" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">ROUTING</text>
  <line x1="245" y1="284" x2="545" y2="284" stroke="#BBBBBB" stroke-width="0.8"/>
  <text x="395" y="300" text-anchor="middle" font-size="9.5" fill="#333333">Execute planned tap sequence step by step</text>
  <text x="395" y="315" text-anchor="middle" font-size="9.5" fill="#333333">Detect and dismiss pop-up interruptions</text>
  <text x="395" y="330" text-anchor="middle" font-size="9"   fill="#777777" font-style="italic">App restart on failure · up to N retries</text>

  <line x1="395" y1="343" x2="395" y2="358" stroke="#333333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="350" y="354" font-size="8" fill="#444444" font-style="italic">target page reached</text>

  <!-- ═══════════════════════════════════════════════════════
       VISION_ACT   y=358  h=88  bottom=446
       ═══════════════════════════════════════════════════════ -->
  <rect x="245" y="358" width="300" height="88" rx="5" fill="#E6F3FF" stroke="#333333" stroke-width="1.5"/>
  <text x="395" y="379" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">VISION_ACT</text>
  <line x1="245" y1="387" x2="545" y2="387" stroke="#BBBBBB" stroke-width="0.8"/>
  <text x="395" y="403" text-anchor="middle" font-size="9.5" fill="#333333">Screenshot · VLM interprets the current UI state</text>
  <text x="395" y="418" text-anchor="middle" font-size="9.5" fill="#333333">Decide and execute the next action</text>
  <text x="395" y="433" text-anchor="middle" font-size="9"   fill="#777777" font-style="italic">Iterates until task completion or step budget exceeded</text>

  <!-- VISION_ACT → FINISH -->
  <polyline points="300,446 300,463 140,463 140,478"
            fill="none" stroke="#333333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="218" y="459" text-anchor="middle" font-size="8" fill="#444444" font-style="italic">task complete</text>

  <!-- ═══════════════════════════════════════════════════════
       FINISH
       ═══════════════════════════════════════════════════════ -->
  <rect x="40" y="478" width="190" height="52" rx="5" fill="#CCE5FF" stroke="#000000" stroke-width="2.0"/>
  <text x="135" y="500" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">FINISH</text>
  <text x="135" y="517" text-anchor="middle" font-size="9"  fill="#333333">Task succeeded · return result</text>

  <!-- ═══════════════════════════════════════════════════════
       FAIL
       ═══════════════════════════════════════════════════════ -->
  <rect x="595" y="478" width="190" height="52" rx="5" fill="#F5F5F5" stroke="#888888" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="690" y="500" text-anchor="middle" font-size="14" font-weight="bold" fill="#888888">FAIL</text>
  <text x="690" y="517" text-anchor="middle" font-size="9"  fill="#999999">Log error reason · terminate execution</text>

  <!-- ═══════════════════════════════════════════════════════
       Failure paths — stubs → right rail at x=810 → FAIL
       ═══════════════════════════════════════════════════════ -->

  <!-- APP_RESOLVE stub -->
  <line x1="545" y1="141" x2="810" y2="141" stroke="#333333" stroke-width="1.2"/>
  <text x="677" y="136" text-anchor="middle" font-size="8" fill="#444444" font-style="italic">app not found</text>

  <!-- ROUTE_PLAN stub -->
  <line x1="545" y1="211" x2="810" y2="211" stroke="#333333" stroke-width="1.2"/>
  <text x="677" y="206" text-anchor="middle" font-size="8" fill="#444444" font-style="italic">no path exists</text>

  <!-- ROUTING stub -->
  <line x1="545" y1="299" x2="810" y2="299" stroke="#333333" stroke-width="1.2"/>
  <text x="677" y="294" text-anchor="middle" font-size="8" fill="#444444" font-style="italic">retries exhausted</text>

  <!-- VISION_ACT stub -->
  <line x1="545" y1="402" x2="810" y2="402" stroke="#333333" stroke-width="1.2"/>
  <text x="677" y="397" text-anchor="middle" font-size="8" fill="#444444" font-style="italic">action failed · step budget exceeded</text>

  <!-- Vertical rail -->
  <line x1="810" y1="141" x2="810" y2="504" stroke="#333333" stroke-width="1.2"/>

  <!-- Rail → FAIL right side -->
  <line x1="810" y1="504" x2="787" y2="504" stroke="#333333" stroke-width="1.2" marker-end="url(#arr)"/>

</svg>
